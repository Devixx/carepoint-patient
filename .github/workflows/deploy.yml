name: Deploy Patient Portal

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: devixx/carepoint-patient
  SERVICE_NAME: patient-portal

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ secrets.DOMAIN_NAME }}/api
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  restart-service:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Pull and restart only the patient-portal service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_IP }}
          username: ubuntu
          key: ${{ secrets.GCP_SSH_KEY }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /home/ubuntu/carepoint

            if [ ! -f docker-compose.yaml ]; then
              echo "docker-compose.yaml not found on the VM."
              echo "Run the backend deploy workflow first to bootstrap the stack."
              exit 1
            fi

            # Login to GHCR so we can pull the new image
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull only the patient-portal image and recreate only that service.
            # --no-deps means we don't touch db, backend, doctor-portal, or caddy.
            sudo docker compose pull patient-portal
            sudo docker compose up -d --no-deps patient-portal
